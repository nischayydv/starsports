name: Build Star Sports Final JSON

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch data
        run: |
          curl -s https://allinonereborn.online/jtv-fetch/jstr4web.json -o channels.json
          curl -s https://allinonereborn.online/jtv-fetch/jstarcookie/cookie.json -o cookies.json

      - name: Process JSON
        run: |
          jq -n '
          # Load inputs
          (input | .failed_results) as $failed
          | (input) as $channels

          [
            $failed[]
            | select(.channel_name | test("Star Sports"))
            | {
                cid: .channel_id,
                cname: .channel_name,
                cookie: (.error_details.final_url | split("?")[1])
              } as $c

            | ($channels[]
              | select(.id == $c.cid)
            ) as $ch

            | {
                id: $ch.id,
                name: $ch.name,
                url: ($ch.url | split("?")[0]),
                cookie: $c.cookie,
                keyId: $ch.keyId,
                key: $ch.key,
                logo: $ch.logo
              }
          ]
          ' cookies.json channels.json > star_sports.json

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add star_sports.json
          git commit -m "Update Star Sports JSON" || echo "No changes"
          git push
