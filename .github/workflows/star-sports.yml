name: Build Star Sports JSON

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch source data
        run: |
          curl -s https://allinonereborn.online/jtv-fetch/jstr4web.json -o channels.json
          curl -s https://allinonereborn.online/jtv-fetch/jstarcookie/cookie.json -o cookies.json

      - name: Generate Star Sports JSON (NO JQ)
        run: |
          mkdir -p output

          node << 'EOF'
          const fs = require("fs");

          const channels = JSON.parse(fs.readFileSync("channels.json", "utf8"));
          const cookies = JSON.parse(fs.readFileSync("cookies.json", "utf8"));

          function mapId(name) {
            const map = {
              "Star Sports 1 Hindi HD": "ss1h",
              "Star Sports 1 HD": "ss1",
              "Star Sports 1": "ss1sd",
              "Star Sports 1 Tamil HD": "ss1tamhd",
              "Star Sports 1 Tamil": "ss1tam",
              "Star Sports 1 Telugu HD": "ss1telhd",
              "Star Sports 1 Telugu": "ss1tel",
              "Star Sports 1 Kannada": "ss1kan",

              "Star Sports 2 Hindi HD": "ss2h",
              "Star Sports 2 Hindi": "ss2hin",
              "Star Sports 2 HD": "ss2",
              "Star Sports 2": "ss2sd",

              "Star Sports 2 Tamil HD": "ss2tamhd",
              "Star Sports 2 Tamil": "ss2tam",

              "Star Sports 2 Telugu HD": "ss2telhd",
              "Star Sports 2 Telugu": "ss2tel",

              "Star Sports 2 Kannada": "ss2kan",
              "Star Sports 3": "ss3",

              "Star Sports Select 1 HD": "sss1h",
              "Star Sports Select 1": "sss1",

              "Star Sports Select 2 HD": "sss2h",
              "Star Sports Select 2": "sss2"
            };
            return map[name] || null;
          }

          function getCookie(name) {
            const item = cookies.failed_results?.find(x => x.channel_name === name);
            if (!item) return null;
            const url = item.error_details?.final_url || "";
            return url.split("?")[1] || "";
          }

          const result = [];

          for (const ch of channels) {
            if (!ch.name || !ch.name.includes("Star Sports")) continue;

            const id = mapId(ch.name);
            if (!id) continue;

            const cookie = getCookie(ch.name);
            if (!cookie) continue;

            result.push({
              id,
              name: ch.name,
              url: (ch.url || "").split("?")[0],
              cookie: "__hdnea__=" + cookie,
              keyId: ch.keyId,
              key: ch.key,
              logo: ch.logo
            });
          }

          fs.writeFileSync("output/star_sports.json", JSON.stringify(result, null, 2));
          console.log("Generated:", result.length, "channels");
          EOF

      - name: Commit & push output
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add output/star_sports.json
          git commit -m "Update Star Sports JSON" || echo "No changes"

          git pull --rebase origin main
          git push
